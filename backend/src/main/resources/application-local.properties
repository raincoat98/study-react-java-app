# 로컬 개발용 프로필 - 별도 DB 서버 없이 H2 임베디드 사용
# 실행: mvn spring-boot:run -Dspring-boot.run.profiles=local

# H2 (파일 모드 - 재시작해도 데이터 유지)
spring.datasource.url=jdbc:h2:file:./data/study_db;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 웹 콘솔: http://localhost:8080/h2-console
spring.h2.console.enabled=true
